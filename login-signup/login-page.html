<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gamify - Log In</title>
    <link rel="stylesheet" href="../shared/site-nav.css" />
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="login.js" defer></script>
  </head>
  <body>
    <header class="site-nav">
      <div class="wrap">
        <a class="brand" href="../index.html">
          <img src="../images/Gamify-Logo.png" alt="Gamify logo" />
          <span>Gamify</span>
        </a>
        <div class="search-bar">
          <input
            type="text"
            placeholder="Search tutorials, articles, topics…"
          />
        </div>
        <nav class="nav-links">
          <a class="nav-link" href="../articles/article-search.html"
            >Articles</a
          >
          <a class="nav-link is-active" href="login-page.html">Account</a>
          <a class="nav-cta" href="../ai-chatbot/index.html">AI Chatbot</a>
        </nav>
      </div>
    </header>
    <div class="login_page">
      <div class="login_form">
        <!-- Login form container -->
        <form>
          <h3>Gamify Log In</h3>
          <!-- Email input box -->
          <div class="input_box">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              placeholder="Enter email address"
              required
            />
          </div>
          <!-- Password input box -->
          <div class="input_box">
            <div class="password_title">
              <label for="password">Password</label>
            </div>
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
              required
            />
          </div>
          <p id="form-error" class="form-error"></p>
          <!-- Login button -->
          <button type="submit" id="submit">Log In</button>
          <p class="sign_up">
            Don't have an account? <a href="signup-page.html">Sign up</a>
          </p>
        </form>
      </div>
    </div>
  </body>
</html>
