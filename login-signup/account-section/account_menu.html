<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gamify - Account Menu</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="../../shared/site-nav.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-nav">
      <div class="wrap">
        <a class="brand" href="../../index.html">
          <img src="../../global-images/Gamify-Logo.png" alt="Gamify logo" />
          <span>Gamify</span>
        </a>

        <nav class="nav-links">
          <a class="nav-link" href="../../articles/article-search.html"
            >Articles</a
          >
          <a class="nav-link is-active" href="#">Account</a>
          <a class="nav-link" href="../../ai-chatbot/index.html">AI Chatbot</a>
          <span id="user-email" class="nav-user"></span>
          <button id="logout-btn" class="nav-cta" style="border: none">
            Log out
          </button>
        </nav>
      </div>
    </header>
    <br />
    <h1 class="text-center mt-3">Account Menu</h1>
    <br />
    <div class="container">
      <div class="row mt-3">
        <div class="col-12 col-md-6 mb-3">
          <div class="card h-100">
            <div class="card-body">
              <img
                src="../../global-images/article-icon.png"
                alt="Article icon"
                class="card-icon"
              />
              <h5 class="card-title">Browse Articles</h5>
              <p class="card-text">
                Search and read game development resources from aross the entire
                internet.
              </p>
              <br />

              <a
                href="../../articles/article-search.html"
                class="btn btn-primary"
                >Browse Now</a
              >
            </div>
          </div>
        </div>
        <div class="col-12 col-md-6 mb-3">
          <div class="card h-100">
            <div class="card-body">
              <img
                src="../../global-images/chat-bot-icon.avif"
                alt="Chatbot icon"
                class="card-icon"
              />
              <h5 class="card-title">AI Chatbot</h5>
              <p class="card-text">
                Chat with Gamify AI for help with anything game development
                related.
              </p>
              <br />
              <a href="../../ai-chatbot/index.html" class="btn btn-primary"
                >Access Now</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script type="module" src="script.js" defer></script>
</html>
