<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gamify - View Article</title>
    <link
      href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../shared/site-nav.css" />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="./displayer-style.css" />
  </head>
  <body>
    <header class="site-nav">
      <div class="wrap">
        <a class="brand" href="../../index.html">
          <img src="../../images/Gamify-Logo.png" alt="Gamify logo" />
          <span>Gamify</span>
        </a>
        <div class="search-bar">
          <input
            type="text"
            placeholder="Search tutorials, articles, topics…"
          />
        </div>
        <nav class="nav-links">
          <a class="nav-link is-active" href="../article-search.html"
            >Articles</a
          >
          <a class="nav-link" href="../../login-signup/login-page.html"
            >Account</a
          >
          <a class="nav-cta" href="../../ai-chatbot/index.html">AI Chatbot</a>
        </nav>
      </div>
    </header>

    <div class="display-wrapper">
      <a class="back-link" href="../article-search.html"
        >&larr; Back to articles</a
      >

      <div id="loading" class="loading-state">Loading article…</div>

      <article
        id="article-wrapper"
        class="article-wrapper"
        style="display: none"
      >
        <span id="article-category" class="article-card-category"></span>
        <h1 id="article-title"></h1>
        <p id="article-meta" class="article-card-meta"></p>
        <div id="article-content" class="ql-editor"></div>
        <div id="owner-actions" class="owner-actions" style="display: none">
          <a id="edit-link" href="#" class="btn-edit">Edit this article</a>
        </div>
      </article>

      <div id="not-found" class="empty-state" style="display: none">
        <p>This article couldn't be found. It may have been deleted.</p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
    <script type="module" src="./article-displayer.js"></script>
  </body>
</html>
