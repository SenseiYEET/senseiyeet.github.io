<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gamify - Article Editor</title>
    <link rel="stylesheet" href="../shared/site-nav.css" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="site-nav">
      <div class="wrap">
        <a class="brand" href="../index.html">
          <img src="../images/Gamify-Logo.png" alt="Gamify logo" />
          <span>Gamify</span>
        </a>
        <div class="search-bar">
          <input
            type="text"
            placeholder="Search tutorials, articles, topics…"
          />
        </div>
        <nav class="nav-links">
          <a class="nav-link is-active" href="article-search.html">Articles</a>
          <a class="nav-link" href="../login-signup/login-page.html">Account</a>
          <a class="nav-cta" href="../ai-chatbot/index.html">AI Chatbot</a>
        </nav>
      </div>
    </header>

    <div class="editor-wrapper">
      <a
        class="back-link"
        href="../login-signup/account-section/article/article-manager.html"
        >&larr; Back to my articles</a
      >
      <h1>Article Editor</h1>

      <div class="editor-meta">
        <label class="meta-field">
          <span>Title</span>
          <input
            id="article-title"
            type="text"
            placeholder="Give your article a title"
          />
        </label>
        <label class="meta-field meta-field-narrow">
          <span>Category</span>
          <select id="article-category">
            <option value="Programming">Programming</option>
            <option value="Art">Art</option>
            <option value="Sound">Sound</option>
            <option value="Design">Design</option>
            <option value="Engine: Unity">Engine: Unity</option>
            <option value="Engine: Unreal">Engine: Unreal</option>
            <option value="Engine: Godot">Engine: Godot</option>
            <option value="Uncategorised">Uncategorised</option>
          </select>
        </label>
      </div>

      <!-- Quill editor container -->
      <div id="editor"></div>

      <div class="editor-actions">
        <button id="preview-btn" type="button">Preview</button>
        <button id="save-btn" type="button">Save</button>
        <button id="delete-btn" type="button">Delete</button>
      </div>
      <p id="editor-status" class="editor-status"></p>
    </div>

    <!-- Quill library -->
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>

    <!-- Editor logic (Firebase auth/db loaded inside this module from /shared) -->
    <script type="module" src="./js/article-editor-function.js"></script>
  </body>
</html>
